<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .app {
      width: 420px;
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 45%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .expense {
      background: #334155;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total {
      margin-top: 20px;
      font-size: 18px;
      text-align: center;
    }

    .delete {
      cursor: pointer;
      color: #ef4444;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>💰 Expense Tracker</h1>

  <input id="title" placeholder="Expense name">
  <input id="amount" type="number" placeholder="Amount">

  <button onclick="addExpense()">Add Expense</button>

  <div id="list"></div>

  <div class="total">
    Total: $<span id="total">0</span>
  </div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function render() {
  const list = document.getElementById("list");
  const totalEl = document.getElementById("total");

  list.innerHTML = "";

  let total = 0;

  expenses.forEach((expense, index) => {
    total += Number(expense.amount);

    const div = document.createElement("div");
    div.className = "expense";

    div.innerHTML = `
      <span>${expense.title} - $${expense.amount}</span>
      <span class="delete" onclick="removeExpense(${index})">x</span>
    `;

    list.appendChild(div);
  });

  totalEl.innerText = total;

  localStorage.setItem("expenses", JSON.stringify(expenses));
}

function addExpense() {
  const title = document.getElementById("title");
  const amount = document.getElementById("amount");

  if (!title.value || !amount.value) return;

  expenses.push({
    title: title.value,
    amount: amount.value
  });

  title.value = "";
  amount.value = "";

  render();
}

function removeExpense(index) {
  expenses.splice(index, 1);
  render();
}

render();
</script>

</body>
</html>
